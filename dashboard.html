<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>DogHouse Inteligente</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>DogHouse Inteligente</h1>

        <div class="painel-horarios">

            <h2>Horário F1</h2>
            <div class="linha-botoes">
                <button class="btn-hora" onclick="alterarHora('F1','HORA')">+ Hora</button>
                <button class="btn-min" onclick="alterarHora('F1','MIN')">+ Min</button>
            </div>

            <h2>Horário F2</h2>
            <div class="linha-botoes">
                <button class="btn-hora" onclick="alterarHora('F2','HORA')">+ Hora</button>
                <button class="btn-min" onclick="alterarHora('F2','MIN')">+ Min</button>
            </div>

            <h2>Modo</h2>
            <button class="btn-run" onclick="mudarParaRun()">Modo RUN</button>

        </div>

        <div id="pesoBox">
            <h2>Peso Atual</h2>
            <p id="pesoValor">-- kg</p>
        </div>

    </div>

    <script src="dashboard.js"></script>
</body>
</html>
