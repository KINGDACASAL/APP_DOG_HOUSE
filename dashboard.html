<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>DogHouse Inteligente</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="dashboard.js"></script>
</head>

<body>

    <div class="container">

        <!-- TEMPERATURA -->
        <div class="panel">
            <h3>Temperatura</h3>
            <h2 id="temp">-- ºC</h2>
        </div>

        <!-- ÁGUA -->
        <div class="panel">
            <h3>Distância da Água</h3>
            <h2 id="agua">-- cm</h2>
        </div>

        <!-- MODO -->
        <div class="panel">
            <h3>Modo Atual</h3>
            <h2 id="modoAtual">AUTO</h2>

            <div class="botoes-modo">
                <button onclick="mudarModo('AUTO')">AUTO</button>
                <button onclick="mudarModo('VERAO')">VERÃO</button>
                <button onclick="mudarModo('INVERNO')">INVERNO</button>
                <button class="btn-run" onclick="mudarModo('RUN')">RUN</button>
            </div>
        </div>

        <!-- HORÁRIOS -->
        <div class="panel">
            <h3>Horário F1</h3>
            <h2 id="f1hora">--:--</h2>

            <div class="linha-botoes">
                <button class="btn-hora" onclick="alterarHora('F1','HORA')">+ Hora</button>
                <button class="btn-min" onclick="alterarHora('F1','MIN')">+ Min</button>
            </div>

            <h3>Horário F2</h3>
            <h2 id="f2hora">--:--</h2>

            <div class="linha-botoes">
                <button class="btn-hora" onclick="alterarHora('F2','HORA')">+ Hora</button>
                <button class="btn-min" onclick="alterarHora('F2','MIN')">+ Min</button>
            </div>
        </div>

        <!-- PESO -->
        <div class="panel">
            <h3>Peso Atual</h3>
            <h2 id="pesoValor">-- kg</h2>
        </div>

    </div>

</body>
</html>
