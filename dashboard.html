<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>DogHouse Inteligente</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="dashboard.js"></script>
</head>

<body>

    <div class="container">

        <!-- PAINEL DO AR CONDICIONADO -->
        <div class="panel">
            <h3>Temperatura</h3>
            <h2 id="temp">-- ºC</h2>

            <h3>Modo AC</h3>
            <h2 id="modoAtual">AUTO</h2>

            <div class="botoes-modo">
                <button onclick="mudarModoAC('AUTO')">AUTO</button>
                <button onclick="mudarModoAC('VERAO')">VERÃO</button>
                <button onclick="mudarModoAC('INVERNO')">INVERNO</button>
            </div>
        </div>

        <!-- PAINEL DO BEBEDOURO -->
        <div class="panel">
            <h3>Distância da Água</h3>
            <h2 id="agua">-- cm</h2>
        </div>

        <!-- PAINEL DA RAÇÃO -->
        <div class="panel">
            <h3>Horário F1</h3>
            <h2 id="f1hora">--:--</h2>

            <div class="linha-botoes">
                <button class="btn-hora" onclick="alterarHora('F1','HORA')">+ Hora</button>
                <button class="btn-min" onclick="alterarHora('F1','MIN')">+ Min</button>
            </div>

            <h3>Horário F2</h3>
            <h2 id="f2hora">--:--</h2>

            <div class="linha-botoes">
                <button class="btn-hora" onclick="alterarHora('F2','HORA')">+ Hora</button>
                <button class="btn-min" onclick="alterarHora('F2','MIN')">+ Min</button>
            </div>

            <h3>Modo da Ração</h3>
            <button class="btn-run" onclick="mudarModoRacao()">RUN</button>
        </div>

        <!-- PESO -->
        <div class="panel">
            <h3>Peso Atual</h3>
            <h2 id="pesoValor">-- kg</h2>
        </div>

    </div>

</body>
</html>
